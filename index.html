<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ivory Web Playground</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; }
        
        /* Dark Mode (Default) */
        :root {
            --bg-deep: #282828;      
            --bg-panel: #32302f;     
            --fg-light: #fbf1c7;     
            --fg-muted: #a89984;     
            --border-soft: #504945;  
            
            --accent-rose: #d3869b;  
            --accent-red: #fb4934;   
            --accent-aqua: #83a598;  
            --accent-green: #b8bb26; 
            
            --selection-bg: rgba(211, 134, 155, 0.2);
            --header-title: #fbf1c7;
        }

        /* Light Mode Palette */
        body.light-mode {
            --bg-deep: #fbf1c7;
            --bg-panel: #ebdbb2;
            --fg-light: #3c3836;
            --fg-muted: #928374;
            --border-soft: #d5c4a1;
            
            --accent-rose: #8f3f71; /* Deeper pink for contrast on light bg */
            --accent-red: #9d0006;
            --accent-aqua: #076678;
            --accent-green: #79740e;
            
            --selection-bg: rgba(143, 63, 113, 0.15);
            --header-title: #3c3836;
        }

        body { 
            background-color: var(--bg-deep); color: var(--fg-light); 
            font-family: 'JetBrains Mono', monospace; 
            margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }
        
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: var(--border-soft); border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--fg-muted); }

        .header { 
            padding: 20px 30px; 
            border-bottom: 2px solid var(--border-soft); 
            display: flex; justify-content: space-between; align-items: center; 
            background-color: var(--bg-deep); 
            transition: background-color 0.3s, border-color 0.3s;
        }
        
        .header h2 { 
            margin: 0; font-size: 1.6rem; font-weight: 700; 
            color: var(--header-title);
            letter-spacing: -0.5px;
            display: flex; align-items: center; gap: 10px;
        }
        
        .header h2 span {
            font-size: 1.1rem;
            color: var(--accent-rose);
            font-weight: 400;
        }
        
        .controls { display: flex; gap: 12px; align-items: center; }
        
        button { 
            border: none; padding: 10px 20px; cursor: pointer; border-radius: 6px; 
            font-weight: bold; font-family: inherit; font-size: 0.95rem; 
            transition: all 0.2s ease;
        }
        
        #themeBtn {
            background: transparent; color: var(--fg-muted);
            border: 1px solid var(--border-soft); padding: 8px 16px;
        }
        #themeBtn:hover {
            background: var(--border-soft);
            color: var(--fg-light);
        }

        #runBtn {
            background: var(--accent-green);
            color: var(--bg-deep);
        }
        #runBtn:hover:not(:disabled) {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }
        #runBtn:disabled {
            background: var(--border-soft);
            color: var(--fg-muted);
            cursor: not-allowed;
        }
        
        #stopBtn {
            background: var(--accent-red);
            color: #fbf1c7; display: none;
        }
        #stopBtn:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        /* Workspace */
        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .pane {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .pane-left {
            border-right: 1px solid var(--border-soft);
            position: relative;
            background: var(--bg-panel);
            transition: background-color 0.3s;
        }
        .pane-right {
            background: var(--bg-deep);
            padding: 30px;
            overflow-y: auto;
            transition: background-color 0.3s;
        }

        .editor-container {
            position: relative;
            flex: 1;
            overflow: hidden;
        }
        .editor-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 30px;
            margin: 0;
            border: none;
            outline: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 15px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-y: auto;
            background: transparent;
        }
        
        #highlights {
            color: var(--fg-muted);
            z-index: 1;
            transition: color 0.3s;
        }
        .kw-emotion {
            color: var(--accent-rose);
            font-weight: 700;
            transition: color 0.3s;
        } 
        .kw-logic {
            color: var(--accent-aqua); 
            font-weight: 700;
            transition: color 0.3s;
        } 
        
        #codeInput { 
            color: transparent;
            caret-color: var(--accent-rose);
            z-index: 2;
            resize: none; 
        }
        #codeInput::selection {
            background: var(--selection-bg);
            color: transparent;
        }

        #output {
            font-family: inherit;
            font-size: 15px;
            white-space: pre-wrap;
            color: var(--fg-light);
            line-height: 1.7;
            transition: color 0.3s;
        }
        .log-msg { 
            color: var(--fg-muted);
            font-style: italic;
            margin-bottom: 20px; 
            display: block;
            border-bottom: 1px solid var(--border-soft);
            padding-bottom: 15px; 
            transition: color 0.3s, border-color 0.3s;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>Ivory <span>// Web Playground</span></h2>
        <div class="controls">
            <button onclick="toggleTheme()" id="themeBtn">☀️ Light Mode</button>
            <button onclick="stopIvory()" id="stopBtn">Halt</button>
            <button onclick="runIvory()" id="runBtn">Execute Story</button>
        </div>
    </div>

    <div class="workspace">
        <div class="pane pane-left">
            <div class="editor-container">
                <div id="highlights" class="editor-layer"></div>
                <textarea id="codeInput" class="editor-layer" oninput="updateHighlights()" spellcheck="false" onscroll="syncScroll()">
// Standard "Hello, World!" program
passion passion passion passion passion passion passion
adore adore whisper passion passion adore adore adore
adore adore adore adore adore adore whisper adore
adore adore adore adore adore adore whisper whisper
adore adore adore whisper forget passion passion passion
passion adore adore adore adore whisper heartbreak miss
miss whisper passion passion passion passion passion adore
adore adore adore adore whisper passion passion adore
adore adore adore whisper adore adore adore whisper
miss miss miss miss miss miss whisper miss
miss miss miss miss miss miss miss whisper
forget passion passion passion adore adore adore whisper
fade
                </textarea>
            </div>
        </div>

        <div class="pane pane-right">
            <span class="log-msg">Terminal output will appear here. Whisper constraint is active.</span>
            <div id="output"></div>
        </div>
    </div>

    <script>
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));
        let executionActive = false;

        const emotions = new Set(['adore', 'miss', 'passion', 'heartbreak', 'cherish', 'reminisce', 'confess', 'forget']);
        const logic = new Set(['hold', 'release', 'whisper', 'listen', 'promise', 'always', 'breathe', 'clear', 'destiny', 'wonder', 'fade']);

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const btn = document.getElementById('themeBtn');
            if (document.body.classList.contains('light-mode')) {
                btn.innerText = "🌙 Dark Mode";
            } else {
                btn.innerText = "☀️ Light Mode";
            }
        }

        function updateHighlights() {
            const text = document.getElementById('codeInput').value;
            let escaped = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            
            const highlighted = escaped.replace(/\b([a-zA-Z]+)\b/g, match => {
                if (emotions.has(match)) return `<span class="kw-emotion">${match}</span>`;
                if (logic.has(match)) return `<span class="kw-logic">${match}</span>`;
                return match; 
            });
            
            document.getElementById('highlights').innerHTML = highlighted + (text.endsWith('\n') ? '<br>' : '');
        }

        function syncScroll() {
            document.getElementById('highlights').scrollTop = document.getElementById('codeInput').scrollTop;
        }

        window.onload = updateHighlights;

        function setRunningState(isRunning) {
            executionActive = isRunning;
            const runBtn = document.getElementById('runBtn');
            const stopBtn = document.getElementById('stopBtn');
            
            if (isRunning) {
                runBtn.style.display = 'none';
                stopBtn.style.display = 'block';
            } else {
                runBtn.style.display = 'block';
                stopBtn.style.display = 'none';
                runBtn.innerText = "Execute Story";
                runBtn.disabled = false;
            }
        }

        function stopIvory() {
            executionActive = false;
        }

        async function runIvory() {
            const out = document.getElementById('output');
            const source = document.getElementById('codeInput').value;
            
            const tokens = source.trim().split(/\s+/);
            if (tokens.length === 0 || tokens[0] === "") return;

            setRunningState(true);
            out.textContent = "";

            let tape = {};
            let p = 0;
            let memories = [];
            let ops = 0; 

            let jumps = {};
            let stack = [];
            for (let i = 0; i < tokens.length; i++) {
                if (tokens[i] === 'promise') stack.push(i);
                else if (tokens[i] === 'always') {
                    if (stack.length > 0) {
                        let start = stack.pop();
                        jumps[start] = i;
                        jumps[i] = start;
                    }
                }
            }

            for (let i = 0; i < tokens.length; i++) {
                if (!executionActive) {
                    out.textContent += "\n\n[Execution Halted by User]";
                    break;
                }

                let word = tokens[i];
                let currentVal = tape[p] || 0;

                if (word === 'adore') tape[p] = currentVal + 1;
                else if (word === 'miss') tape[p] = currentVal - 1;
                else if (word === 'hold') p++;
                else if (word === 'release') p--;
                else if (word === 'passion') tape[p] = currentVal + 10;
                else if (word === 'heartbreak') tape[p] = currentVal - 10;
                else if (word === 'forget') tape[p] = 0;
                
                else if (word === 'promise' && currentVal === 0) i = jumps[i];
                else if (word === 'always' && currentVal !== 0) i = jumps[i];

                else if (word === 'cherish') memories.push(currentVal);
                else if (word === 'reminisce' && memories.length > 0) tape[p] = memories.pop();
                
                else if (word === 'clear') out.textContent = "";
                else if (word === 'breathe') await sleep(1000);
                else if (word === 'confess') out.textContent += (tape[p] || 0) + "\n";
                else if (word === 'whisper') {
                    out.textContent += String.fromCharCode(tape[p] || 0);
                    await sleep(50); 
                }

                else if (word === 'destiny') p = currentVal;
                else if (word === 'wonder') tape[p] = Math.floor(Math.random() * Number.MAX_SAFE_INTEGER);
                else if (word === 'fade') {
                    out.textContent += "\n\n[Execution Faded]";
                    break;
                }
                else if (word === 'listen') {
                    // Triggers a native browser pause/input box
                    let input = prompt("Ivory is listening...\nType a single character:");
                    tape[p] = (input && input.length > 0) ? input.charCodeAt(0) : 0;
                }

                ops++;
                if (ops % 1000 === 0) await sleep(0); 
            }

            setRunningState(false);
        }
    </script>
</body>
</html>
